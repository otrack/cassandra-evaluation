<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Accord Message Viz</title>
  <style>
    body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: sans-serif; background-color: #1a1a1a; color: white; overflow: hidden; }
    #main { width: 100%; height: 100%; }
    #overlay { position: absolute; top: 10px; left: 10px; z-index: 10; pointer-events: none; }
    
    #overlay h2 { font-size: 2em; margin-top: 0; }
    #stats { font-size: 1.5em; font-weight: bold; }

    /* Legend Styles */
    #legend { margin-top: 20px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; }
    #legend h3 { font-size: 1.5em; margin-top: 0; margin-bottom: 10px; }
    .legend-item { display: flex; align-items: center; margin-bottom: 8px; }
    .legend-color { width: 20px; height: 20px; border-radius: 50%; margin-right: 12px; }
    .legend-item span { font-size: 1.3em; }
    
    /* Database State Styles */
    #db-state { position: absolute; top: 10px; right: 10px; width: 240px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; z-index: 10; }
    #db-state h3 { font-size: 1.3em; margin-top: 0; margin-bottom: 12px; }
    .account-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .account-info { display: flex; align-items: center; font-size: 1.2em; }
    .robot-avatar { width: 45px; height: 45px; border-radius: 50%; background: #333; margin-right: 12px; object-fit: cover; transition: transform 0.2s; }
    .account-balance { font-family: monospace; font-size: 1.3em; font-weight: bold; display: flex; align-items: center; }
    .total-row { border-top: 1px solid #555; margin-top: 12px; padding-top: 12px; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.4em; align-items: center; }

    /* Quorum Log Styles */
    #quorum-log { position: absolute; bottom: 10px; right: 10px; width: 442px; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 8px; z-index: 10; }
    #quorum-log h3 { margin-top: 0; font-size: 1.3em; border-bottom: 1px solid #555; padding-bottom: 5px; margin-bottom: 10px; }
    .quorum-entry { margin-bottom: 8px; font-family: monospace; font-size: 1.1em; line-height: 1.4em; height: 1.4em; }
    .quorum-id { color: #f4e925; font-weight: bold; margin-right: 5px; }
    .quorum-dcs { color: #73c0de; }
    
    @keyframes blinkHappy {
      0% { transform: scale(1); filter: brightness(1); }
      50% { transform: scale(1.3); filter: brightness(1.5) drop-shadow(0 0 15px #f4e925); }
      100% { transform: scale(1); filter: brightness(1); }
    }
    .happy { animation: blinkHappy 0.8s ease-in-out; }

    @keyframes blinkLight {
      0% { opacity: 1; filter: brightness(1); }
      25% { opacity: 0.4; filter: brightness(2); }
      50% { opacity: 1; filter: brightness(1); }
      75% { opacity: 0.4; filter: brightness(2); }
      100% { opacity: 1; filter: brightness(1); }
    }
    .blink { animation: blinkLight 0.8s ease-in-out; }

    .diamond-icon { height: 0.9em; width: auto; vertical-align: middle; margin-left: 4px; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
</head>
<body>
  <div id="overlay">
  <h2>Accord Protocol Demo</h2>
  <div id="stats">Messages: 0</div>

  <div id="legend">
    <!-- Legend is populated dynamically -->
  </div>
</div>

<div style="position: absolute; bottom: 20px; left: 20px; z-index: 20; pointer-events: auto; display: flex; flex-direction: column; gap: 10px;">
  <button id="mode-toggle-btn" style="display: none; background: #73c0de; color: #1a1a1a; border: none; padding: 10px 20px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    Simplified Mode: ON
  </button>
  <button id="interleaved-toggle-btn" style="background: #fac858; color: #1a1a1a; border: none; padding: 10px 20px; font-size: 1.2em; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
    Interleaved Mode: ON
  </button>
</div>

<div id="db-state">
  <h3 style="margin-top: 0;">Database State</h3>
  <div id="accounts-container"></div>
  <div class="total-row">
    <span>Total:</span>
    <span id="total-balance">0<img src="/robots/diamond.png" class="diamond-icon"></span>
  </div>
</div>

<div id="quorum-log">
  <h3>Quorum History</h3>
  <div id="quorum-container"></div>
</div>

  <div id="main"></div>

  <script>
    const socket = io();
    const chart = echarts.init(document.getElementById('main'));
    
    let nodes = [];
    let dcMap = {};
    let locations = {};
    let messageCount = 0;
    let activeLines = [];
    let robotImages = [];
    let accountRobots = {}; // y_id -> robot image path
    let mapLoaded = false;
    let isSlowMode = false;
    let isSimplifiedMode = true;
    let isInterleaved = true;
    let quorumHistory = [];
    let blinkingRobots = new Set();

    let knownAccounts = {}; // y_id -> balance

    const diamondHtml = '<img src="/robots/diamond.png" class="diamond-icon">';

    function updateLegend() {
      const legend = document.getElementById('legend');
      if (isSimplifiedMode) {
        legend.innerHTML = `
          <h3>Message Legend</h3>
          <div class="legend-item"><div class="legend-color" style="background: #73c0de;"></div><span>FAST PATH</span></div>
          <div class="legend-item"><div class="legend-color" style="background: #ee6666;"></div><span>SLOW PATH</span></div>
        `;
      } else {
        legend.innerHTML = `
          <h3>Message Legend</h3>
          <div class="legend-item"><div class="legend-color" style="background: #73c0de;"></div><span>PRE-ACCEPT</span></div>
          <div class="legend-item"><div class="legend-color" style="background: #fac858;"></div><span>ACCEPT</span></div>
          <div class="legend-item"><div class="legend-color" style="background: #91cc75;"></div><span>COMMIT / APPLY</span></div>
        `;
      }
    }

    // Call once to initialize
    updateLegend();

    document.getElementById('mode-toggle-btn').addEventListener('click', () => {
      isSimplifiedMode = !isSimplifiedMode;
      const btn = document.getElementById('mode-toggle-btn');
      btn.innerText = `Simplified Mode: ${isSimplifiedMode ? 'ON' : 'OFF'}`;
      btn.style.background = isSimplifiedMode ? '#73c0de' : '#91cc75';
      updateLegend();
    });

    document.getElementById('interleaved-toggle-btn').addEventListener('click', () => {
      socket.emit('toggle_interleaved');
    });

    socket.on('interleaved_mode', (val) => {
        isInterleaved = val;
        const btn = document.getElementById('interleaved-toggle-btn');
        btn.innerText = `Interleaved Mode: ${isInterleaved ? 'ON' : 'OFF'}`;
        btn.style.background = isInterleaved ? '#fac858' : '#73c0de';
    });

    // Load World Map
    $.get('https://cdn.jsdelivr.net/npm/echarts@4.9.0/map/json/world.json', function (worldJson) {
      echarts.registerMap('world', worldJson);
      
      const option = {
        backgroundColor: '#1a1a1a',
        geo: {
          map: 'world',
          roam: true,
          aspectScale: 0.75, // Fixed aspect ratio
          layoutCenter: ['50%', '50%'],
          layoutSize: '160%',
          label: { emphasis: { show: false } },
          itemStyle: {
            normal: { areaColor: '#323c48', borderColor: '#111' },
            emphasis: { areaColor: '#2a333d' }
          }
        },
        series: [
          {
            type: 'effectScatter',
            coordinateSystem: 'geo',
            zlevel: 2,
            rippleEffect: { brushType: 'stroke' },
            label: { show: true, position: 'right', formatter: '{b}', color: '#fff', fontSize: 14, fontWeight: 'bold' },
            symbolSize: 15,
            itemStyle: { color: '#f4e925' },
            data: nodes
          },
          {
            type: 'lines',
            coordinateSystem: 'geo',
            zlevel: 3, 
            animation: false,
            effect: { show: false },
            symbol: ['none', 'arrow'],
            symbolSize: 10,
            lineStyle: { 
              width: 3, 
              curveness: 0.2, 
              opacity: 0.8 
            },
            data: []
          }
        ]
      };
      chart.setOption(option);
      mapLoaded = true;
      if (isSlowMode) updateSlowMode(true);
    });

    window.onresize = function() {
        chart.resize();
    };

    function getMessageColor(type) {
      if (!type) return null;
      const t = type.toUpperCase();
      
      // Fast Path / Read responses
      if (t.includes('PREACCEPT') || t.includes('PRE-ACCEPT') || t.includes('PRE_ACCEPT') || 
          t.includes('SIMPLE_RSP') || t.includes('READ_RSP') || t.includes('GET_DEPS_RSP')) {
        return '#73c0de'; // Blue for Fast Path / Reads
      }
      
      // Slow Path
      if (t.includes('ACCEPT')) {
        return isSimplifiedMode ? '#ee6666' : '#fac858'; // Red in simplified (Slow Path), Yellow in normal
      }
      
      // End of transaction (Commit/Apply)
      if (t.includes('COMMIT') || t.includes('APPLY')) {
        return isSimplifiedMode ? null : '#91cc75'; // Hidden in simplified
      }
      
      return null;
    }

    function updateChart() {
      if (!mapLoaded) return;
      chart.setOption({
        animation: false,
        series: [
          { data: nodes },
          { data: activeLines }
        ]
      });
    }

    function updateSlowMode(isSlow) {
      // No animation changes needed in static mode
    }

    socket.on('slow_mode', (isSlow) => {
      isSlowMode = isSlow;
    });

    socket.on('robot_images', (images) => {
      robotImages = images;
      renderAccounts();
    });

    socket.on('locations', (locs) => {
      locations = locs;
      // Update existing nodes if necessary
      nodes.forEach(n => {
        if (locations[n.name]) {
          n.value = locations[n.name];
        }
      });
      updateChart();
    });

    socket.on('datacenter_mapping', (map) => {
      dcMap = map;
      Object.keys(map).forEach(ip => {
        let existingNode = nodes.find(n => n.id === ip);
        const dcName = map[ip];
        if (!existingNode && locations[dcName]) {
          nodes.push({
            id: ip,
            name: dcName,
            value: locations[dcName]
          });
        }
      });
      updateChart();
    });

    socket.on('message_flow', (msg) => {
      const color = getMessageColor(msg.type);
      if (!color) return; // Skip "other" messages

      messageCount++;
      document.getElementById('stats').innerText = `Messages: ${messageCount}`;
      
      const srcNode = nodes.find(n => n.id === msg.source);
      const targetNode = nodes.find(n => n.id === msg.target);
      
      if (srcNode && targetNode) {
        const srcCoords = srcNode.value;
        const dstCoords = targetNode.value;
        
        // Shorten the line by 8% to make the arrow visible outside the node circle
        const ratio = 0.08; 
        const shortDst = [
            dstCoords[0] + (srcCoords[0] - dstCoords[0]) * ratio,
            dstCoords[1] + (srcCoords[1] - dstCoords[1]) * ratio
        ];

        const newEdge = {
          id: 'msg-' + messageCount,
          coords: [ srcCoords, shortDst ],
          lineStyle: { color: color }
        };
        
        activeLines.push(newEdge);
        updateChart();

        // Message remains visible for a fixed duration
        setTimeout(() => {
          const index = activeLines.indexOf(newEdge);
          if (index > -1) {
            activeLines.splice(index, 1);
            updateChart();
          }
        }, isSlowMode ? 2500 : 1000);
      }
    });

    function renderAccounts() {
      const container = document.getElementById('accounts-container');
      let html = '';
      let total = 0;
      
      const accounts = Object.keys(knownAccounts).sort((a, b) => a.localeCompare(b));
      
      accounts.forEach((y_id, i) => {
        let bal = knownAccounts[y_id];
        if (bal === null || bal === undefined) bal = 0;
        total += bal;
        
        if (!accountRobots[y_id] && robotImages.length > 0) {
          // Use a hash of the y_id to pick a stable and more unique robot
          let hash = 0;
          for (let k = 0; k < y_id.length; k++) {
            hash = ((hash << 5) - hash) + y_id.charCodeAt(k);
            hash |= 0; // Convert to 32bit integer
          }
          const imgIndex = Math.abs(hash) % robotImages.length;
          accountRobots[y_id] = '/robots/' + robotImages[imgIndex];
        }
        
        const avatarSrc = accountRobots[y_id] || '';
        const isBlinking = blinkingRobots.has(y_id);
        const blinkClass = isBlinking ? 'happy blink' : '';
        
        html += `
          <div class="account-row" id="acc-${y_id}">
            <div class="account-info">
              <img src="${avatarSrc}" class="robot-avatar ${blinkClass}" id="avatar-${y_id}">
              <span>${y_id}</span>
            </div>
            <span class="account-balance">${bal}${diamondHtml}</span>
          </div>
        `;
      });
      
      container.innerHTML = html;
      document.getElementById('total-balance').innerHTML = `${total}${diamondHtml}`;
    }

    function renderQuorumLog() {
        const container = document.getElementById('quorum-container');
        let html = '';
        
        // Show exactly 4 entries
        const recent = quorumHistory.slice(-4).reverse();
        
        // Pad with hidden entries if we have fewer than 4 to maintain size
        for (let i = 0; i < 4; i++) {
            if (recent[i]) {
                const tx = recent[i];
                html += `
                    <div class="quorum-entry">
                        <span class="quorum-id">TX #${tx.id}:</span>
                        <span class="quorum-dcs">{${tx.quorum.join(',')}}</span>
                    </div>
                `;
            } else {
                html += `
                    <div class="quorum-entry" style="visibility: hidden;">
                        <span class="quorum-id">TX #?:</span>
                        <span class="quorum-dcs">---</span>
                    </div>
                `;
            }
        }
        container.innerHTML = html;
    }

    let latestDbState = null;

    socket.on('db_state', (balances) => {
      if (!balances || !Array.isArray(balances)) return;
      latestDbState = balances;
      
      const newKnownAccounts = {};
      balances.forEach(acc => {
        newKnownAccounts[acc.y_id] = acc.field0;
      });
      knownAccounts = newKnownAccounts;
      
      renderAccounts();
    });

    socket.on('transfer_start', (tx) => {
      const node = nodes.find(n => n.id === tx.coordinator);
      if (node) {
        node.label = {
          show: true,
          position: 'top',
          formatter: `{transfer|${tx.label}}\n{dcName|{b}}`,
          rich: {
            transfer: {
              color: '#f4e925',
              fontSize: 20,
              fontWeight: 'bold',
              lineHeight: 28,
              textBorderColor: '#000',
              textBorderWidth: 3
            },
            dcName: {
              color: '#fff',
              fontSize: 14,
              fontWeight: 'bold'
            }
          }
        };
        updateChart();
      }
    });

    socket.on('transfer_complete', (tx) => {
      // Add to quorum log
      quorumHistory.push(tx);
      renderQuorumLog();

      // Transaction executed
      handleTransactionComplete(tx);

      // Hide the transfer message
      const node = nodes.find(n => n.id === tx.coordinator);
      if (node) {
        delete node.label; // Restore default label
        updateChart();
      }
    });

    function handleTransactionComplete(tx) {
      // Set blinking state for the recipient
      blinkingRobots.add(tx.to);
      renderAccounts(); // Re-render immediately to show blink
      
      // Remove blink state after animation duration
      setTimeout(() => {
          blinkingRobots.delete(tx.to);
          renderAccounts(); // Re-render to remove class
      }, 1000);
    }

    // Initial render
    renderAccounts();
    renderQuorumLog();

  </script>
</body>
</html>
